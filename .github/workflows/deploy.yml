name: Deploy to Cloudflare Workers

# Deploys the Docusaurus build to the Cloudflare Worker named in
# wrangler.jsonc (docjacket-help) whenever main moves. Manual runs are
# allowed via workflow_dispatch when you need to force a re-deploy.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with "Workers Scripts: Edit" and
#                           "Account: Read" on the docjacket account.
#                           Create at dash.cloudflare.com → My Profile →
#                           API Tokens → "Edit Cloudflare Workers" template.
#   CLOUDFLARE_ACCOUNT_ID — found in dash.cloudflare.com sidebar
#                           ("Account ID" under any zone).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Wrangler v4 requires Node 22+. Docusaurus 3.8 also fine on 22.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      # Use the wrangler installed by `npm ci` so we get the v4 line
      # that supports assets-only deploys (no `main` worker script needed).
      # The cloudflare/wrangler-action default pins to an older wrangler
      # that errors with "Missing entry-point" on this kind of config.
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
